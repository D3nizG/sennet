services:
  - type: web
    name: sennet-api
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build -w @sennet/game-engine && npm run db:generate -w server && npm run build -w server
    preDeployCommand: npm run db:migrate:deploy -w server
    startCommand: npm run start -w server
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
